services:
  deezspotag:
    container_name: deezspotag
    image: ${DEEZSPOTAG_IMAGE:-ghcr.io/lauqnan14/deezspotag-web:latest}
    network_mode: host
    user: "${PUID:-1026}:${PGID:-100}"
    env_file:
      - path: .env
        required: false
    environment:
      DEEZSPOTAG_APPLE_WRAPPER_MODE: external
      DEEZSPOTAG_APPLE_WRAPPER_HOST: 127.0.0.1
    volumes:
      # Auto-create app state folder if missing.
      - type: bind
        source: ${DEEZSPOTAG_DATA_PATH:-/volume1/docker/deezspotag/data}
        target: /data
        bind:
          create_host_path: true
      # Compatibility path for images that still write under /app/Data.
      - type: bind
        source: ${DEEZSPOTAG_APPDATA_PATH:-/volume1/docker/deezspotag/app-data}
        target: /app/Data
        bind:
          create_host_path: true
      # Do not auto-create media folders; fail fast if path is wrong/missing.
      - type: bind
        source: ${DOWNLOADS_PATH:-/volume1/downloads}
        target: /downloads
        bind:
          create_host_path: false
      - type: bind
        source: ${LIBRARY_PATH:-/volume1/music}
        target: /library
        read_only: true
        bind:
          create_host_path: false
    restart: unless-stopped

  apple-wrapper:
    container_name: apple-wrapper
    image: ${APPLE_WRAPPER_IMAGE:-ghcr.io/lauqnan14/deezspotag-apple-wrapper:latest}
    network_mode: host
    init: true
    pid: host
    ipc: host
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    env_file:
      - path: ${APPLE_WRAPPER_ENV_FILE:-Tools/AppleMusicWrapper/docker/apple-wrapper.env}
        required: false
    volumes:
      # Auto-create wrapper state folders if missing.
      - type: bind
        source: ${APPLE_WRAPPER_DATA_PATH:-/volume1/docker/deezspotag/apple-wrapper/data}
        target: /opt/apple-wrapper/data
        bind:
          create_host_path: true
      - type: bind
        source: ${APPLE_WRAPPER_SESSION_PATH:-/volume1/docker/deezspotag/apple-wrapper/session}
        target: /opt/apple-wrapper/rootfs/data/data/com.apple.android.music
        bind:
          create_host_path: true
    restart: unless-stopped
