services:
  deezspotag:
    container_name: deezspotag
    image: ${DEEZSPOTAG_IMAGE:-ghcr.io/lauqnan14/deezspotag:prerelease}
    pull_policy: always
    network_mode: host
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - path: .env
        required: false
    environment:
      DEEZSPOTAG_APPLE_WRAPPER_MODE: external
      DEEZSPOTAG_APPLE_WRAPPER_CONTROL_MODE: ${DEEZSPOTAG_APPLE_WRAPPER_CONTROL_MODE:-shared}
      DEEZSPOTAG_APPLE_WRAPPER_HOST: 127.0.0.1
      DEEZSPOTAG_APPLE_WRAPPER_SHARED_DATA_DIR: /apple-wrapper/data
      DEEZSPOTAG_APPLE_WRAPPER_SHARED_SESSION_DIR: /apple-wrapper/session
      DEEZSPOTAG_DATA_DIR: /data
      DEEZSPOTAG_CONFIG_DIR: /data
    volumes:
      # Auto-create app state folder if missing.
      - type: bind
        source: ${DEEZSPOTAG_DATA_PATH:-./DeezSpoTag.Workers/Data}
        target: /data
        bind:
          create_host_path: true
      # Compatibility path for images that still write under /app/Data.
      - type: bind
        source: ${DEEZSPOTAG_APPDATA_PATH:-./DeezSpoTag.Workers/Data}
        target: /app/Data
        bind:
          create_host_path: true
      # Local defaults stay inside the repo and are auto-created for first run.
      - type: bind
        source: ${DOWNLOADS_PATH:-./Downloads}
        target: /downloads
        bind:
          create_host_path: true
      - type: bind
        source: ${LIBRARY_PATH:-./Library}
        target: /library
        bind:
          create_host_path: true
      # Shared Apple wrapper control paths (no Docker socket dependency).
      - type: bind
        source: ${APPLE_WRAPPER_DATA_PATH:-./Data/apple-wrapper/data}
        target: /apple-wrapper/data
        bind:
          create_host_path: true
      - type: bind
        source: ${APPLE_WRAPPER_SESSION_PATH:-./Data/apple-wrapper/session}
        target: /apple-wrapper/session
        bind:
          create_host_path: true
    restart: unless-stopped

  apple-wrapper:
    container_name: apple-wrapper
    image: ${APPLE_WRAPPER_IMAGE:-ghcr.io/lauqnan14/deezspotag-apple-wrapper:prerelease}
    pull_policy: always
    network_mode: host
    user: "${APPLE_WRAPPER_UID:-0}:${APPLE_WRAPPER_GID:-0}"
    env_file:
      - path: ${APPLE_WRAPPER_ENV_FILE:-Tools/AppleMusicWrapper/docker/apple-wrapper.env}
        required: false
    volumes:
      # Auto-create wrapper state folders if missing.
      - type: bind
        source: ${APPLE_WRAPPER_DATA_PATH:-./Data/apple-wrapper/data}
        target: /opt/apple-wrapper/data
        bind:
          create_host_path: true
      - type: bind
        source: ${APPLE_WRAPPER_SESSION_PATH:-./Data/apple-wrapper/session}
        target: /opt/apple-wrapper/rootfs/data/data/com.apple.android.music
        bind:
          create_host_path: true
      # Map host random devices directly; this avoids mknod variance across Linux distros.
      - type: bind
        source: /dev/urandom
        target: /opt/apple-wrapper/rootfs/dev/urandom
        read_only: true
      - type: bind
        source: /dev/random
        target: /opt/apple-wrapper/rootfs/dev/random
        read_only: true
    restart: unless-stopped
