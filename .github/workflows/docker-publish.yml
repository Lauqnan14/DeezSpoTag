name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel to publish"
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - stable

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.resolve.outputs.channel }}
    steps:
      - name: Resolve release channel
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          channel="prerelease"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            input_channel="${{ github.event.inputs.release_channel }}"
            if [[ "$input_channel" == "stable" ]]; then
              channel="stable"
            fi
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "Release channel: ${channel}"

  bump-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip-version-bump]')
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      target_version: ${{ steps.bump.outputs.target_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version revision
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          props_file="Directory.Build.props"
          changelog_file="CHANGELOG.md"

          ./scripts/release.sh change

          target_prefix="$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' "$props_file" | head -n1)"
          target_revision="$(sed -n 's:.*<VersionRevision>\([0-9]\+\)</VersionRevision>.*:\1:p' "$props_file" | head -n1)"

          if [ -z "$target_prefix" ] || [ -z "$target_revision" ]; then
            echo "Unable to read VersionPrefix/VersionRevision from $props_file after bump" >&2
            exit 1
          fi

          target_version="${target_prefix}.${target_revision}"

          if git diff --quiet -- "$props_file" "$changelog_file"; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "target_version=${target_version}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "target_version=${target_version}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$props_file" "$changelog_file"
          git commit -m "chore(release): bump version to ${target_version} [skip-version-bump]"
          git push origin HEAD:main

  parity-smoke:
    needs: [release-context, bump-version]
    if: always() && github.ref == 'refs/heads/main' && (needs.bump-version.result != 'success' || needs.bump-version.outputs.bumped != 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DeezSpoTag parity image
        run: |
          docker build \
            --build-arg DEEZSPOTAG_BUILD_VERSION=${GITHUB_SHA} \
            -t deezspotag-parity:${GITHUB_SHA} \
            .

      - name: Build Apple wrapper parity image
        run: |
          docker build \
            -f Tools/AppleMusicWrapper/Dockerfile \
            -t deezspotag-apple-wrapper-parity:${GITHUB_SHA} \
            .

      - name: Run Docker parity smoke test
        run: |
          chmod +x scripts/docker-parity-smoke.sh
          PARITY_APPLE_WRAPPER_IMAGE=deezspotag-apple-wrapper-parity:${GITHUB_SHA} \
            ./scripts/docker-parity-smoke.sh deezspotag-parity:${GITHUB_SHA}

  publish:
    needs: [release-context, bump-version, parity-smoke]
    if: always() && github.ref == 'refs/heads/main' && (needs.bump-version.result != 'success' || needs.bump-version.outputs.bumped != 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: deezspotag
            dockerfile: Dockerfile
            platforms: linux/amd64
          - image_name: deezspotag-apple-wrapper
            dockerfile: Tools/AppleMusicWrapper/Dockerfile
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute commit tags
        id: commit
        run: |
          echo "full_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Compute app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          props_file="Directory.Build.props"
          prefix="$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' "$props_file" | head -n1)"
          revision="$(sed -n 's:.*<VersionRevision>\([0-9]\+\)</VersionRevision>.*:\1:p' "$props_file" | head -n1)"
          if [[ -z "$prefix" || -z "$revision" ]]; then
            echo "Unable to read VersionPrefix/VersionRevision from $props_file" >&2
            exit 1
          fi
          app_version="${prefix}.${revision}"
          IFS='.' read -r major minor _ <<< "$prefix"
          app_major_minor="${major}.${minor}"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "app_major_minor=${app_major_minor}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: vars
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=prerelease,enable=${{ needs.release-context.outputs.channel == 'prerelease' }}
            type=raw,value=${{ steps.version.outputs.app_version }}-pre,enable=${{ needs.release-context.outputs.channel == 'prerelease' }}
            type=raw,value=latest,enable=${{ needs.release-context.outputs.channel == 'stable' }}
            type=raw,value=${{ steps.version.outputs.app_version }},enable=${{ needs.release-context.outputs.channel == 'stable' }}
            type=raw,value=${{ steps.version.outputs.app_major_minor }},enable=${{ needs.release-context.outputs.channel == 'stable' }}
            type=raw,value=${{ steps.commit.outputs.short_sha }}
            type=raw,value=${{ steps.commit.outputs.full_sha }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=DeezSpoTag container image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}
            org.opencontainers.image.channel=${{ needs.release-context.outputs.channel }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          pull: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEEZSPOTAG_BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      - name: Verify wrapper multi-arch manifest
        if: matrix.image_name == 'deezspotag-apple-wrapper'
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ steps.vars.outputs.image }}:${{ steps.commit.outputs.full_sha }}"
          inspect_output="$(docker buildx imagetools inspect "$ref")"
          printf '%s\n' "$inspect_output"
          if ! grep -q 'linux/amd64' <<< "$inspect_output"; then
            echo "Missing linux/amd64 in published wrapper manifest: $ref" >&2
            exit 1
          fi
          if ! grep -q 'linux/arm64' <<< "$inspect_output"; then
            echo "Missing linux/arm64 in published wrapper manifest: $ref" >&2
            exit 1
          fi

  release:
    needs: [release-context, bump-version, publish]
    if: always() && github.ref == 'refs/heads/main' && (needs.bump-version.result != 'success' || needs.bump-version.outputs.bumped != 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release entry
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          props_file="Directory.Build.props"
          prefix="$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' "$props_file" | head -n1)"
          revision="$(sed -n 's:.*<VersionRevision>\([0-9]\+\)</VersionRevision>.*:\1:p' "$props_file" | head -n1)"
          if [[ -z "$prefix" || -z "$revision" ]]; then
            echo "Unable to read VersionPrefix/VersionRevision from $props_file" >&2
            exit 1
          fi
          app_version="${prefix}.${revision}"

          channel="${{ needs.release-context.outputs.channel }}"
          if [[ "$channel" == "stable" ]]; then
            tag="v${app_version}"
            title="v${app_version}"
            prerelease_flag=""
          else
            tag="v${app_version}-pre"
            title="v${app_version} (Prerelease)"
            prerelease_flag="--prerelease"
          fi

          if ! git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            git tag "${tag}" "${GITHUB_SHA}"
            git push origin "${tag}"
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists. Skipping."
            exit 0
          fi

          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "${title}" \
            ${prerelease_flag} \
            --generate-notes
