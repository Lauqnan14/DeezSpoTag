name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel to publish"
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - stable

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.resolve.outputs.channel }}
    steps:
      - name: Resolve release channel
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          channel="prerelease"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            input_channel="${{ github.event.inputs.release_channel }}"
            if [[ "$input_channel" == "stable" ]]; then
              channel="stable"
            fi
          fi
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "Release channel: ${channel}"

  bump-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip-version-bump]')
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      target_version: ${{ steps.bump.outputs.target_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version revision
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          props_file="Directory.Build.props"
          ./scripts/release.sh change

          target_prefix="$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' "$props_file" | head -n1)"
          target_revision="$(sed -n 's:.*<VersionRevision>\([0-9]\+\)</VersionRevision>.*:\1:p' "$props_file" | head -n1)"

          if [ -z "$target_prefix" ] || [ -z "$target_revision" ]; then
            echo "Unable to read VersionPrefix/VersionRevision from $props_file after bump" >&2
            exit 1
          fi

          target_version="${target_prefix}.${target_revision}"
          if git diff --quiet -- "$props_file"; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "target_version=${target_version}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "target_version=${target_version}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$props_file"
          git commit -m "chore(release): bump version to ${target_version} [skip-version-bump]"
          git push origin HEAD:main

  publish:
    needs: [release-context, bump-version]
    if: always() && github.ref == 'refs/heads/main' && needs.bump-version.result != 'failure' && needs.bump-version.result != 'cancelled'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: deezspotag
            dockerfile: Dockerfile
            platforms: linux/amd64
          - image_name: deezspotag-apple-wrapper
            dockerfile: Tools/AppleMusicWrapper/Dockerfile
            platforms: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to latest main
        run: |
          set -euo pipefail
          git fetch origin main --tags
          git checkout -B main origin/main

      - name: Compute commit tags
        id: commit
        run: |
          full_sha="$(git rev-parse HEAD)"
          echo "full_sha=${full_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${full_sha::7}" >> "$GITHUB_OUTPUT"

      - name: Compute app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          props_file="Directory.Build.props"
          prefix="$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' "$props_file" | head -n1)"
          revision="$(sed -n 's:.*<VersionRevision>\([0-9]\+\)</VersionRevision>.*:\1:p' "$props_file" | head -n1)"
          if [[ -z "$prefix" || -z "$revision" ]]; then
            echo "Unable to read VersionPrefix/VersionRevision from $props_file" >&2
            exit 1
          fi
          app_version="${prefix}.${revision}"
          IFS='.' read -r major minor _ <<< "$prefix"
          app_major_minor="${major}.${minor}"
          channel="${{ needs.release-context.outputs.channel }}"
          if [[ "$channel" == "stable" ]]; then
            app_release_tag="v${app_version}"
          else
            app_release_tag="v${app_version}-pre"
          fi
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "app_major_minor=${app_major_minor}" >> "$GITHUB_OUTPUT"
          echo "app_release_tag=${app_release_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app audit image
        if: matrix.image_name == 'deezspotag'
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --build-arg DEEZSPOTAG_BUILD_VERSION=${{ steps.version.outputs.app_release_tag }} \
            --load \
            -t deezspotag-audit:${{ steps.commit.outputs.full_sha }} \
            .

      - name: Build wrapper audit image for app smoke
        if: matrix.image_name == 'deezspotag'
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f Tools/AppleMusicWrapper/Dockerfile \
            -t deezspotag-apple-wrapper-audit:${{ steps.commit.outputs.full_sha }} \
            .

      - name: Run app parity smoke audit
        if: matrix.image_name == 'deezspotag'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/docker-parity-smoke.sh
          PARITY_TEST_PLATFORM=linux/amd64 \
          PARITY_EXPECTED_BUILD_VERSION=${{ steps.version.outputs.app_release_tag }} \
          PARITY_APPLE_WRAPPER_IMAGE=deezspotag-apple-wrapper-audit:${{ steps.commit.outputs.full_sha }} \
            ./scripts/docker-parity-smoke.sh deezspotag-audit:${{ steps.commit.outputs.full_sha }}

      - name: Build wrapper audit image
        if: matrix.image_name == 'deezspotag-apple-wrapper'
        shell: bash
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f Tools/AppleMusicWrapper/Dockerfile \
            -t deezspotag-apple-wrapper-audit:${{ steps.commit.outputs.full_sha }} \
            .

      - name: Run wrapper runtime contract audit
        if: matrix.image_name == 'deezspotag-apple-wrapper'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/apple-wrapper-runtime-smoke.sh
          PARITY_TEST_PLATFORM=linux/amd64 \
            ./scripts/apple-wrapper-runtime-smoke.sh deezspotag-apple-wrapper-audit:${{ steps.commit.outputs.full_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: vars
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=prerelease,enable=${{ needs.release-context.outputs.channel == 'prerelease' }}
            type=raw,value=v${{ steps.version.outputs.app_version }}-pre,enable=${{ needs.release-context.outputs.channel == 'prerelease' }}
            type=raw,value=latest,enable=${{ needs.release-context.outputs.channel == 'stable' }}
            type=raw,value=v${{ steps.version.outputs.app_version }},enable=${{ needs.release-context.outputs.channel == 'stable' }}
            type=raw,value=${{ steps.commit.outputs.short_sha }}
            type=raw,value=${{ steps.commit.outputs.full_sha }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=DeezSpoTag container image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.commit.outputs.full_sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.version.outputs.app_release_tag }}
            org.opencontainers.image.channel=${{ needs.release-context.outputs.channel }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          pull: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEEZSPOTAG_BUILD_VERSION=${{ steps.version.outputs.app_release_tag }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      - name: Verify published manifest platforms
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ steps.vars.outputs.image }}:${{ steps.commit.outputs.full_sha }}"
          inspect_output="$(docker buildx imagetools inspect "$ref")"
          printf '%s\n' "$inspect_output"
          IFS=',' read -ra expected_platforms <<< "${{ matrix.platforms }}"
          for platform in "${expected_platforms[@]}"; do
            if ! grep -q "$platform" <<< "$inspect_output"; then
              echo "Missing $platform in published manifest: $ref" >&2
              exit 1
            fi
          done

      - name: Run wrapper runtime contract audit (published)
        if: matrix.image_name == 'deezspotag-apple-wrapper'
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ steps.vars.outputs.image }}:${{ steps.commit.outputs.full_sha }}"
          IFS=',' read -ra expected_platforms <<< "${{ matrix.platforms }}"
          for platform in "${expected_platforms[@]}"; do
            docker pull --platform "$platform" "$ref"
            PARITY_TEST_PLATFORM="$platform" \
              ./scripts/apple-wrapper-runtime-smoke.sh "$ref"
          done

  release:
    needs: [release-context, bump-version, publish]
    if: always() && github.ref == 'refs/heads/main' && needs.bump-version.result != 'failure' && needs.bump-version.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          set -euo pipefail
          git fetch origin main --tags
          git checkout -B main origin/main

      - name: Create GitHub release entry
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          props_file="Directory.Build.props"
          prefix="$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' "$props_file" | head -n1)"
          revision="$(sed -n 's:.*<VersionRevision>\([0-9]\+\)</VersionRevision>.*:\1:p' "$props_file" | head -n1)"
          if [[ -z "$prefix" || -z "$revision" ]]; then
            echo "Unable to read VersionPrefix/VersionRevision from $props_file" >&2
            exit 1
          fi
          app_version="${prefix}.${revision}"
          release_sha="$(git rev-parse HEAD)"

          channel="${{ needs.release-context.outputs.channel }}"
          if [[ "$channel" == "stable" ]]; then
            tag="v${app_version}"
            title="v${app_version}"
            prerelease_flag=""
            is_prerelease="false"
          else
            tag="v${app_version}-pre"
            title="v${app_version} (Prerelease)"
            prerelease_flag="--prerelease"
            is_prerelease="true"
          fi

          repo="${{ github.repository }}"
          release_endpoint="repos/${repo}/releases/tags/${tag}"
          existing_release_json="/tmp/release-existing.json"
          existing_release="false"
          previous_ref=""

          if gh api "${release_endpoint}" > "${existing_release_json}" 2>/dev/null; then
            existing_release="true"
            previous_ref="$(jq -r '.target_commitish // empty' "${existing_release_json}")"
          fi

          if [[ "$is_prerelease" == "true" ]]; then
            # Keep prerelease tag moving with latest main so prerelease entry auto-updates.
            git tag -f "${tag}" "${release_sha}"
            git push origin "refs/tags/${tag}" --force
          elif ! git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            git tag "${tag}" "${release_sha}"
            git push origin "${tag}"
          fi

          if [[ -n "${previous_ref}" ]] && ! git rev-parse --verify "${previous_ref}^{commit}" >/dev/null 2>&1; then
            previous_ref=""
          fi

          if [[ -n "${previous_ref}" && "${previous_ref}" == "${release_sha}" ]]; then
            previous_ref=""
          fi

          if [[ -z "${previous_ref}" ]]; then
            if [[ "$is_prerelease" == "true" ]]; then
              if git rev-parse --verify "${release_sha}^" >/dev/null 2>&1; then
                previous_ref="$(git rev-parse "${release_sha}^")"
              fi
            else
              previous_ref="$(git tag --list 'v*' --sort=-v:refname \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' \
                | grep -Fvx "${tag}" \
                | head -n1 || true)"
            fi
          fi

          if [[ -n "${previous_ref}" ]]; then
            range_count="$(git rev-list --count "${previous_ref}..${release_sha}" || echo 0)"
            if [[ "${range_count}" == "0" ]]; then
              previous_ref=""
            fi
          fi

          compare_url=""
          if [[ -n "${previous_ref}" ]]; then
            compare_url="https://github.com/${repo}/compare/${previous_ref}...${tag}"
          fi

          notes_file="$(mktemp)"
          changelog_file=""
          for candidate in CHANGELOG.md Changelog.md changelog.md; do
            if [[ -f "${candidate}" ]]; then
              changelog_file="${candidate}"
              break
            fi
          done

          changelog_tmp="$(mktemp)"
          changelog_found="false"
          if [[ -n "${changelog_file}" ]]; then
            normalized_tag="${tag#v}"
            awk -v tag="${tag}" -v nt="${normalized_tag}" '
              BEGIN {
                capture = 0;
              }
              /^[[:space:]]*##[[:space:]]+/ {
                if (capture == 1) {
                  exit;
                }
                heading = $0;
                if (index(heading, "[" tag "]") || index(heading, "[" nt "]") || index(heading, tag) || index(heading, nt)) {
                  capture = 1;
                  next;
                }
              }
              capture == 1 {
                print;
              }
            ' "${changelog_file}" > "${changelog_tmp}"
            if grep -q '[^[:space:]]' "${changelog_tmp}"; then
              changelog_found="true"
            fi
          fi

          {
            if [[ "${changelog_found}" == "true" ]]; then
              echo "## Changelog"
              cat "${changelog_tmp}"
              echo
              echo "## Commits"
            else
              echo "## Commits"
            fi

            if [[ -n "${previous_ref}" ]]; then
              git log --pretty="- %s ([\`%h\`](https://github.com/${repo}/commit/%H))" "${previous_ref}..${release_sha}"
            else
              git log -n 30 --pretty="- %s ([\`%h\`](https://github.com/${repo}/commit/%H))" "${release_sha}"
            fi
            if [[ -n "${compare_url}" ]]; then
              echo
              echo "## Compare"
              echo "- [Compare changes](${compare_url})"
            fi
          } > "${notes_file}"

          if ! grep -q '^- ' "${notes_file}"; then
            echo "- No new commits captured for this release range." >> "${notes_file}"
          fi

          notes="$(cat "${notes_file}")"

          if [[ "${existing_release}" == "true" ]]; then
            release_id="$(jq -r '.id' "${existing_release_json}")"
            gh api -X PATCH "repos/${{ github.repository }}/releases/${release_id}" \
              -f tag_name="${tag}" \
              -f target_commitish="${release_sha}" \
              -f name="${title}" \
              -F draft=false \
              -F prerelease="${is_prerelease}" \
              --raw-field body="${notes}" >/dev/null
            echo "Updated release ${tag} at ${release_sha}."
            exit 0
          fi

          gh release create "${tag}" \
            --target "${release_sha}" \
            --title "${title}" \
            ${prerelease_flag} \
            --notes "${notes}"
