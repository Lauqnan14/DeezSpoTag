name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip-version-bump]')
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      target_version: ${{ steps.bump.outputs.target_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version revision
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          props_file="Directory.Build.props"

          current_prefix="$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' "$props_file" | head -n1)"
          current_revision="$(sed -n 's:.*<VersionRevision>\([0-9]\+\)</VersionRevision>.*:\1:p' "$props_file" | head -n1)"

          if [ -z "$current_prefix" ] || [ -z "$current_revision" ]; then
            echo "Unable to read VersionPrefix/VersionRevision from $props_file" >&2
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$current_prefix"
          if [ -z "${major:-}" ] || [ -z "${minor:-}" ] || [ -z "${patch:-}" ]; then
            echo "VersionPrefix must use major.minor.patch format, got: $current_prefix" >&2
            exit 1
          fi

          next_revision=$((current_revision + 1))
          next_prefix="$current_prefix"
          if [ "$next_revision" -gt 9 ]; then
            next_revision=0
            next_prefix="${major}.${minor}.$((patch + 1))"
          fi

          sed -i "s|<VersionPrefix>${current_prefix}</VersionPrefix>|<VersionPrefix>${next_prefix}</VersionPrefix>|" "$props_file"
          sed -i "s|<VersionRevision>${current_revision}</VersionRevision>|<VersionRevision>${next_revision}</VersionRevision>|" "$props_file"

          if git diff --quiet -- "$props_file"; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "target_version=${current_prefix}.${current_revision}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          target_version="${next_prefix}.${next_revision}"
          echo "bumped=true" >> "$GITHUB_OUTPUT"
          echo "target_version=${target_version}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$props_file"
          git commit -m "chore(release): bump version to ${target_version} [skip-version-bump]"
          git push origin HEAD:main

  parity-smoke:
    needs: bump-version
    if: always() && github.ref == 'refs/heads/main' && (needs.bump-version.result != 'success' || needs.bump-version.outputs.bumped != 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DeezSpoTag parity image
        run: |
          docker build \
            --build-arg DEEZSPOTAG_BUILD_VERSION=${GITHUB_SHA} \
            -t deezspotag-parity:${GITHUB_SHA} \
            .

      - name: Build Apple wrapper parity image
        run: |
          docker build \
            -f Tools/AppleMusicWrapper/Dockerfile \
            -t deezspotag-apple-wrapper-parity:${GITHUB_SHA} \
            .

      - name: Run Docker parity smoke test
        run: |
          chmod +x scripts/docker-parity-smoke.sh
          PARITY_APPLE_WRAPPER_IMAGE=deezspotag-apple-wrapper-parity:${GITHUB_SHA} \
            ./scripts/docker-parity-smoke.sh deezspotag-parity:${GITHUB_SHA}

  publish:
    needs: [bump-version, parity-smoke]
    if: always() && github.ref == 'refs/heads/main' && (needs.bump-version.result != 'success' || needs.bump-version.outputs.bumped != 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: deezspotag
            dockerfile: Dockerfile
            platforms: linux/amd64
          - image_name: deezspotag-apple-wrapper
            dockerfile: Tools/AppleMusicWrapper/Dockerfile
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute commit tags
        id: commit
        run: |
          echo "full_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: vars
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.commit.outputs.short_sha }}
            type=raw,value=${{ steps.commit.outputs.full_sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=DeezSpoTag container image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          pull: true
          platforms: ${{ matrix.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DEEZSPOTAG_BUILD_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
